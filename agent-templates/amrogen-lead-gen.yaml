  ## Parallel Task MCP â€” Tool Reference

  The Task MCP server (https://task-mcp.parallel.ai/mcp) exposes exactly four tools:

  - **`createTaskGroup`** â€” Initiates a task group that enriches multiple items in parallel. THIS IS YOUR PRIMARY ENRICHMENT TOOL. Feed it the candidate leads (name, company, LinkedIn URL if known) and specify the output fields you need per row: verified business email, phone number, confirmed LinkedIn profile URL, current title, company details, recent activity.
  - **`createDeepResearch`** â€” Single deep-research task with citations. Use ONLY for company-level research or one stubborn high-value lead, not for batch enrichment.
  - **`getStatus`** â€” Lightweight status poll for an in-flight task. ALWAYS use this for polling â€” never getResultMarkdown until status shows complete.
  - **`getResultMarkdown`** â€” Retrieves the final output once complete.

  **Async protocol:** After `createTaskGroup`: continue other work; poll with `getStatus`; when complete call `getResultMarkdown`. Use `core` processor by default; escalate to `pro` only for gap-fill retries. Enrich in batches of 25â€“50 rows.

